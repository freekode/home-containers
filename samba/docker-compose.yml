version: '3'

services:
  samba:
    image: crazymax/samba
    container_name: samba
    privileged: true
    ports:
      - 445:445
      - 3702:3702
      - 5355:5355
    volumes:
      - ${CONFIGURATION_PATH}/samba/data:/data
    environment:
      - TZ=${TZ}
      - SAMBA_HOSTS_ALLOW=${SAMBA_HOSTS_ALLOW}
    restart: always
